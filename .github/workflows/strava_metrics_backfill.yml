name: Strava Metrics Backfill

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Only backfill activities on/after this date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"
      limit:
        description: "Max activities to backfill in one run (set 0 for unlimited)"
        required: true
        default: "90"
      types:
        description: "Activity groups to backfill (cycling or all)"
        required: true
        default: "cycling"

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Backfill Strava metrics
        run: |
          python run_page/strava_backfill_metrics.py \
            ${{ secrets.STRAVA_CLIENT_ID }} \
            ${{ secrets.STRAVA_CLIENT_SECRET }} \
            ${{ secrets.STRAVA_CLIENT_REFRESH_TOKEN }} \
            --since "${{ inputs.since }}" \
            --limit "${{ inputs.limit }}" \
            --types "${{ inputs.types }}"

      - name: Commit updated data
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add run_page/data.db src/static/activities.json
          git commit -m 'backfill strava missing metrics' || echo 'nothing to commit'
          git push || echo 'nothing to push'

  publish:
    name: Publish GitHub Pages
    needs: backfill
    uses: ./.github/workflows/gh-pages.yml
    with:
      save_data_in_github_cache: false
      data_cache_prefix: track_data
    secrets: inherit
