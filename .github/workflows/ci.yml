name: CI

on: [push, pull_request]

jobs:
  python_lint_and_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run GPX sync smoke check
        run: |
          python run_page/gpx_sync.py
          python - <<'PY'
          import json
          from pathlib import Path
          records = json.loads(Path("src/static/activities.json").read_text(encoding="utf-8"))
          assert isinstance(records, list) and len(records) > 0, "gpx_sync produced no activities"
          PY

      - name: Run metrics regression tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run data quality guard
        if: matrix.python-version == '3.13'
        run: |
          python run_page/data_quality_guard.py \
            --max-db-only 5 \
            --max-json-only 1 \
            --max-speed-mismatch-count 5 \
            --speed-mismatch-tolerance 0.01 \
            --max-invalid-speed-without-moving 0 \
            --max-extreme-speed-count 2 \
            --extreme-speed-threshold 20.0 \
            --max-elevation-loss-null-ratio 0.8

      - name: Check formatting (black)
        run: black . --diff --color && black . --check

      - name: Lint with Ruff
        run: ruff check .

  node_lint_and_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run check and build
        run: |
          pnpm run check
          pnpm run lint
          pnpm run build
